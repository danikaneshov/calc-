<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Смена / Аналитика</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --highlight: #111111;
            --muted: #666666;
            --border: #222222;
            --accent: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px 20px 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            letter-spacing: -0.5px;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin: 10px 0 5px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            width: 100%;
            max-width: 400px;
        }

        .status-badge {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--muted);
            width: 100%;
            max-width: 400px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* Калькулятор */
        .pickers-wrapper {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 400px;
        }

        .picker-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .picker-label {
            font-size: 12px;
            margin-bottom: 10px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--muted);
            letter-spacing: 1px;
        }

        .picker-container {
            height: 120px;
            width: 100%;
            position: relative;
            background-color: var(--highlight);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .picker-container::before {
            content: "";
            position: absolute;
            top: 40px;
            left: 0;
            right: 0;
            height: 40px;
            background-color: rgba(255, 255, 255, 0.03);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            pointer-events: none;
            z-index: 2;
        }

        .picker {
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            -ms-overflow-style: none;
            position: relative;
            z-index: 1;
            scroll-behavior: smooth;
        }

        .picker::-webkit-scrollbar { display: none; }
        .spacer { height: 40px; }

        .picker-item {
            height: 40px;
            line-height: 40px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            scroll-snap-align: center;
            color: #333;
            transition: all 0.2s ease;
        }

        .picker-item.active {
            color: var(--text-color);
            font-size: 24px;
        }

        /* Итоги */
        .result-card {
            margin-top: 30px;
            width: 100%;
            max-width: 400px;
        }

        .report-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 8px 0;
            font-size: 14px;
            color: var(--muted);
        }

        .report-row span:last-child {
            font-weight: 600;
            color: var(--text-color);
            font-variant-numeric: tabular-nums;
        }

        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 15px 0;
        }

        .total-row span:first-child { font-weight: 800; text-transform: uppercase; color: var(--text-color); }
        .total-price { font-size: 28px; font-weight: 800; }

        .save-btn {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background-color: var(--text-color);
            color: var(--bg-color);
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .save-btn:active { opacity: 0.7; }

        /* Аналитика */
        .analytics-section {
            width: 100%;
            max-width: 400px;
            margin-top: 50px;
        }

        .filters {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            flex: 1;
            padding: 8px 2px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
        }

        .filter-btn.active {
            background: var(--border);
            color: var(--text-color);
            border-color: var(--muted);
        }

        .date-inputs {
            display: flex;
            gap: 5px;
            width: 100%;
            margin-top: 5px;
        }
        
        .date-inputs input {
            flex: 1;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-color);
            padding: 8px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 12px;
            color-scheme: dark;
        }

        /* График */
        .chart {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            height: 100px;
            margin-bottom: 20px;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--border);
            gap: 4px;
        }

        .bar-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            height: 100%;
            position: relative;
        }

        .bar {
            width: 100%;
            max-width: 20px;
            background-color: var(--muted);
            border-radius: 2px 2px 0 0;
            transition: height 0.3s ease, background-color 0.3s;
        }

        .bar-wrapper:last-child .bar {
            background-color: var(--text-color);
        }

        .bar-label {
            font-size: 9px;
            color: var(--muted);
            margin-top: 4px;
            font-variant-numeric: tabular-nums;
        }

    </style>
</head>
<body>

    <h1>Смена</h1>
    <div class="status-badge" id="shift-status">Загрузка...</div>

    <div class="pickers-wrapper">
        <div class="picker-column">
            <div class="picker-label">Кальяны</div>
            <div class="picker-container"><div class="picker" id="hookah-picker"><div class="spacer"></div><div class="spacer"></div></div></div>
        </div>
        <div class="picker-column">
            <div class="picker-label">Замены</div>
            <div class="picker-container"><div class="picker" id="replacement-picker"><div class="spacer"></div><div class="spacer"></div></div></div>
        </div>
    </div>

    <div class="result-card">
        <div class="report-row"><span>Оклад</span><span>7 000 ₸</span></div>
        <div class="report-row"><span>Процент (10%)</span><span id="bonus-price">0 ₸</span></div>
        <div class="divider"></div>
        <div class="report-row total-row"><span>Итого</span><span class="total-price" id="total-price">7 000 ₸</span></div>
        <button class="save-btn" onclick="saveCurrentShift()">Сохранить смену</button>
    </div>

    <div class="analytics-section">
        <h1>Аналитика</h1>
        
        <div class="filters">
            <button class="filter-btn active" onclick="setFilter('3', this)">3 дня</button>
            <button class="filter-btn" onclick="setFilter('7', this)">Неделя</button>
            <button class="filter-btn" onclick="setFilter('30', this)">Месяц</button>
            <button class="filter-btn" onclick="setFilter('all', this)">Все</button>
            <button class="filter-btn" onclick="setFilter('custom', this)">Период</button>
        </div>
        
        <div class="date-inputs" id="custom-dates" style="display: none;">
            <input type="date" id="date-start" onchange="generateReport()">
            <input type="date" id="date-end" onchange="generateReport()">
        </div>

        <div class="chart" id="trend-chart">
            </div>

        <div class="result-card" style="margin-top: 0;">
            <div class="report-row"><span>Смен отработано</span><span id="stat-shifts">0</span></div>
            <div class="report-row"><span>Сделано кальянов</span><span id="stat-hookahs">0</span></div>
            
            <div class="divider"></div>
            
            <div class="report-row"><span>Чисто окладом</span><span id="stat-base">0 ₸</span></div>
            <div class="report-row"><span>Чисто процентами</span><span id="stat-bonus">0 ₸</span></div>
            
            <div class="divider"></div>
            
            <div class="report-row total-row"><span>Общий доход</span><span id="stat-total" style="font-size: 22px;">0 ₸</span></div>
        </div>
    </div>

    <script>
        const MAX_VALUE = 25;
        const REPEATS = 60;
        const ITEM_HEIGHT = 40;
        const BASE_SALARY = 7000;
        const STORAGE_KEY = 'shift_stats_db';

        let hookahCount = 0;
        let replacementCount = 0;
        let currentHookahPrice = 0;
        let currentReplacementPrice = 0;
        let finalSum = 0;
        let shiftDateStr = "";
        let currentFilter = '3';

        const fmt = (num) => num.toLocaleString('ru-RU');

        // --- ЛОГИКА КАЛЬКУЛЯТОРА ---
        function initPickers() {
            const hPicker = document.getElementById('hookah-picker');
            const rPicker = document.getElementById('replacement-picker');
            
            [hPicker, rPicker].forEach(picker => {
                const spacerBottom = picker.lastElementChild;
                for (let r = 0; r < REPEATS; r++) {
                    for (let i = 0; i <= MAX_VALUE; i++) {
                        const div = document.createElement('div');
                        div.className = 'picker-item';
                        div.dataset.value = i;
                        div.textContent = i;
                        picker.insertBefore(div, spacerBottom);
                    }
                }
                picker.style.scrollBehavior = 'auto';
                picker.scrollTop = Math.floor(REPEATS / 2) * (MAX_VALUE + 1) * ITEM_HEIGHT;
                setTimeout(() => picker.style.scrollBehavior = 'smooth', 50);
            });

            hPicker.addEventListener('scroll', () => handleScroll(hPicker, 'hookah'));
            rPicker.addEventListener('scroll', () => handleScroll(rPicker, 'replacement'));
        }

        function handleScroll(picker, type) {
            const index = Math.round(picker.scrollTop / ITEM_HEIGHT);
            const items = picker.querySelectorAll('.picker-item');
            items.forEach(item => item.classList.remove('active'));
            
            if (items[index]) {
                items[index].classList.add('active');
                const val = parseInt(items[index].dataset.value);
                type === 'hookah' ? hookahCount = val : replacementCount = val;
                calculateTotal();
            }
        }

        function getShiftDate() {
            const now = new Date();
            if (now.getHours() < 15) now.setDate(now.getDate() - 1); 
            return now;
        }

        function updateShiftPricing() {
            const shiftDate = getShiftDate();
            const day = shiftDate.getDay();
            
            shiftDateStr = shiftDate.toISOString().split('T')[0];

            const isWeekend = (day === 5 || day === 6 || day === 0); 
            currentHookahPrice = isWeekend ? 7900 : 4900;
            currentReplacementPrice = isWeekend ? 5900 : 4490;

            const days = ["ВС", "ПН", "ВТ", "СР", "ЧТ", "ПТ", "СБ"];
            document.getElementById('shift-status').textContent = `${shiftDateStr} | ${days[day]} | ${isWeekend ? 'ВЫХОДНОЙ' : 'БУДНИЙ'} ТАРИФ`;
        }

        function calculateTotal() {
            const bonus = Math.round((hookahCount * currentHookahPrice + replacementCount * currentReplacementPrice) * 0.10);
            finalSum = BASE_SALARY + bonus;
            document.getElementById('bonus-price').textContent = fmt(bonus) + ' ₸';
            document.getElementById('total-price').textContent = fmt(finalSum) + ' ₸';
        }

        // --- ЛОГИКА БАЗЫ ДАННЫХ И ОТЧЕТОВ ---
        function getDB() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        }

        function saveCurrentShift() {
            const db = getDB();
            db[shiftDateStr] = {
                total: finalSum,
                hookahs: hookahCount,
                replacements: replacementCount,
                timestamp: new Date().getTime()
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
            
            const btn = document.querySelector('.save-btn');
            btn.textContent = "СОХРАНЕНО!";
            btn.style.backgroundColor = "#4caf50";
            setTimeout(() => {
                btn.textContent = "СОХРАНИТЬ СМЕНУ";
                btn.style.backgroundColor = "var(--text-color)";
            }, 2000);

            generateReport(); 
        }

        function setFilter(type, btnObj) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btnObj.classList.add('active');
            currentFilter = type;
            
            document.getElementById('custom-dates').style.display = type === 'custom' ? 'flex' : 'none';
            if(type !== 'custom') generateReport();
        }

        function generateReport() {
            const db = getDB();
            const dates = Object.keys(db).sort();
            if (dates.length === 0) return;

            let targetDates = [];
            const today = getShiftDate();
            today.setHours(0,0,0,0);

            if (currentFilter === 'all') {
                targetDates = dates; // Берем вообще все дни из базы
            } else if (currentFilter === 'custom') {
                const start = document.getElementById('date-start').value;
                const end = document.getElementById('date-end').value;
                if (!start || !end) return;
                targetDates = dates.filter(d => d >= start && d <= end);
            } else {
                const daysBack = parseInt(currentFilter);
                for(let i = daysBack - 1; i >= 0; i--) {
                    const d = new Date(today);
                    d.setDate(d.getDate() - i);
                    targetDates.push(d.toISOString().split('T')[0]);
                }
            }

            renderStatsAndChart(targetDates, db);
        }

        function renderStatsAndChart(dates, db) {
            let sumTotal = 0;
            let sumBase = 0;
            let sumBonus = 0;
            let sumHookahs = 0;
            let shiftsWorked = 0;
            let maxDailyTotal = 1;

            dates.forEach(date => {
                if(db[date]) {
                    shiftsWorked++;
                    sumTotal += db[date].total;
                    sumBase += BASE_SALARY; // Оклад за каждую отработанную смену
                    sumBonus += (db[date].total - BASE_SALARY); // Процент за смену
                    sumHookahs += db[date].hookahs;
                    if(db[date].total > maxDailyTotal) maxDailyTotal = db[date].total;
                }
            });

            document.getElementById('stat-shifts').textContent = shiftsWorked;
            document.getElementById('stat-hookahs').textContent = sumHookahs;
            
            // Новые поля для разбивки дохода
            document.getElementById('stat-base').textContent = fmt(sumBase) + ' ₸';
            document.getElementById('stat-bonus').textContent = fmt(sumBonus) + ' ₸';
            document.getElementById('stat-total').textContent = fmt(sumTotal) + ' ₸';

            const chartArea = document.getElementById('trend-chart');
            chartArea.innerHTML = '';

            dates.forEach(date => {
                const dayData = db[date] || { total: 0 };
                const heightPercent = (dayData.total / maxDailyTotal) * 100;
                const shortDate = date.split('-')[2];

                const barWrap = document.createElement('div');
                barWrap.className = 'bar-wrapper';
                barWrap.innerHTML = `
                    <div class="bar" style="height: ${heightPercent}%"></div>
                    <div class="bar-label">${shortDate}</div>
                `;
                chartArea.appendChild(barWrap);
            });
        }

        initPickers();
        updateShiftPricing();
        setTimeout(() => {
            handleScroll(document.getElementById('hookah-picker'), 'hookah');
            handleScroll(document.getElementById('replacement-picker'), 'replacement');
        }, 100);

        const dEnd = getShiftDate();
        const dStart = new Date(dEnd.getFullYear(), dEnd.getMonth(), 1);
        document.getElementById('date-end').value = dEnd.toISOString().split('T')[0];
        document.getElementById('date-start').value = dStart.toISOString().split('T')[0];

        generateReport();

        setInterval(() => {
            updateShiftPricing();
            calculateTotal();
        }, 60000);

    </script>
</body>
</html>
