<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Смена / Аналитика</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --highlight: #111111;
            --muted: #666666;
            --border: #222222;
            --accent: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px 20px 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            letter-spacing: -0.5px;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin: 10px 0 5px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            width: 100%;
            max-width: 400px;
        }

        .status-badge {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--muted);
            width: 100%;
            max-width: 400px;
            margin-bottom: 30px;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
        }

        #db-status { color: #ff9800; }

        /* Калькулятор */
        .pickers-wrapper {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 400px;
        }

        .picker-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .picker-label {
            font-size: 12px;
            margin-bottom: 10px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--muted);
            letter-spacing: 1px;
        }

        .picker-container {
            height: 120px;
            width: 100%;
            position: relative;
            background-color: var(--highlight);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .picker-container::before {
            content: "";
            position: absolute;
            top: 40px;
            left: 0;
            right: 0;
            height: 40px;
            background-color: rgba(255, 255, 255, 0.03);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            pointer-events: none;
            z-index: 2;
        }

        .picker {
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            -ms-overflow-style: none;
            position: relative;
            z-index: 1;
            scroll-behavior: smooth;
        }

        .picker::-webkit-scrollbar { display: none; }
        .spacer { height: 40px; }

        .picker-item {
            height: 40px;
            line-height: 40px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            scroll-snap-align: center;
            color: #333;
            transition: all 0.2s ease;
        }

        .picker-item.active {
            color: var(--text-color);
            font-size: 24px;
        }

        /* Итоги */
        .result-card {
            margin-top: 30px;
            width: 100%;
            max-width: 400px;
        }

        .report-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 8px 0;
            font-size: 14px;
            color: var(--muted);
        }

        .report-row span:last-child {
            font-weight: 600;
            color: var(--text-color);
            font-variant-numeric: tabular-nums;
        }

        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 15px 0;
        }

        .total-row span:first-child { font-weight: 800; text-transform: uppercase; color: var(--text-color); }
        .total-price { font-size: 28px; font-weight: 800; }

        .save-btn {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background-color: var(--text-color);
            color: var(--bg-color);
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .save-btn:active { transform: scale(0.98); opacity: 0.8; }

        .secondary-btn {
            background-color: var(--highlight);
            color: var(--muted);
            border: 1px solid var(--border);
            margin-top: 30px;
            font-size: 11px;
        }

        /* Форма ручного ввода */
        .manual-form {
            display: none;
            background: var(--highlight);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 15px;
            margin-top: 15px;
        }
        .manual-form input {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            color: var(--text-color);
            padding: 12px;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
            margin-bottom: 10px;
            color-scheme: dark;
        }
        .manual-form .input-group {
            display: flex;
            gap: 10px;
        }

        /* Аналитика */
        .analytics-section {
            width: 100%;
            max-width: 400px;
            margin-top: 50px;
            position: relative;
        }

        .filters {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            flex: 1;
            padding: 8px 2px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn.active {
            background: var(--text-color);
            color: var(--bg-color);
            border-color: var(--text-color);
        }

        .date-inputs {
            display: flex;
            gap: 5px;
            width: 100%;
            margin-top: 5px;
        }
        
        .date-inputs input {
            flex: 1;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-color);
            padding: 8px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 12px;
            color-scheme: dark;
        }

        /* Линейный график и Интерактив */
        .chart-container {
            position: relative;
            width: 100%;
            margin-bottom: 20px;
        }

        .chart {
            width: 100%;
            height: 140px;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            overflow-y: hidden;
            -ms-overflow-style: none;  
            scrollbar-width: none;  
            scroll-behavior: smooth;
        }
        .chart::-webkit-scrollbar { display: none; }

        .chart-node-hitbox {
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        /* Всплывающая подсказка (Glassmorphism) */
        .chart-tooltip {
            position: fixed;
            background: rgba(28, 28, 30, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transform: translate(-50%, 10px);
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        .chart-tooltip.visible {
            opacity: 1;
            transform: translate(-50%, -15px);
        }
        .tooltip-date { font-size: 10px; color: var(--muted); text-transform: uppercase; font-weight: 800; letter-spacing: 1px; margin-bottom: 4px; }
        .tooltip-total { font-size: 18px; font-weight: 800; color: var(--text-color); margin-bottom: 4px; font-variant-numeric: tabular-nums;}
        .tooltip-details { font-size: 11px; color: var(--muted); font-weight: 600; }
        .tooltip-details span { color: var(--text-color); }

    </style>
</head>
<body>

    <div id="tooltip" class="chart-tooltip">
        <div class="tooltip-date" id="tt-date">--</div>
        <div class="tooltip-total" id="tt-total">--</div>
        <div class="tooltip-details" id="tt-details">--</div>
    </div>

    <h1>Смена</h1>
    <div class="status-badge">
        <span id="shift-status">Загрузка...</span>
        <span id="db-status">ПОДКЛЮЧЕНИЕ К БАЗЕ...</span>
    </div>

    <div class="pickers-wrapper">
        <div class="picker-column">
            <div class="picker-label">Кальяны</div>
            <div class="picker-container"><div class="picker" id="hookah-picker"><div class="spacer"></div><div class="spacer"></div></div></div>
        </div>
        <div class="picker-column">
            <div class="picker-label">Замены</div>
            <div class="picker-container"><div class="picker" id="replacement-picker"><div class="spacer"></div><div class="spacer"></div></div></div>
        </div>
    </div>

    <div class="result-card">
        <div class="report-row"><span>Оклад</span><span>7 000 ₸</span></div>
        <div class="report-row"><span>Процент (10%)</span><span id="bonus-price">0 ₸</span></div>
        <div class="divider"></div>
        <div class="report-row total-row"><span>Итого</span><span class="total-price" id="total-price">7 000 ₸</span></div>
        <button class="save-btn" onclick="saveCurrentShift()">Сохранить смену</button>
    </div>

    <div class="analytics-section">
        <h1>Аналитика</h1>
        
        <div class="filters">
            <button class="filter-btn active" onclick="setFilter('3', this)">3 дня</button>
            <button class="filter-btn" onclick="setFilter('7', this)">Неделя</button>
            <button class="filter-btn" onclick="setFilter('30', this)">Месяц</button>
            <button class="filter-btn" onclick="setFilter('all', this)">Все</button>
            <button class="filter-btn" onclick="setFilter('custom', this)">Период</button>
        </div>
        
        <div class="date-inputs" id="custom-dates" style="display: none;">
            <input type="date" id="date-start" onchange="generateReport()">
            <input type="date" id="date-end" onchange="generateReport()">
        </div>

        <div class="chart-container">
            <div class="chart" id="trend-chart" onscroll="hideTooltip()"></div>
        </div>

        <div class="result-card" style="margin-top: 0;">
            <div class="report-row"><span>Смен отработано</span><span id="stat-shifts">0</span></div>
            <div class="report-row"><span>Сделано кальянов</span><span id="stat-hookahs">0</span></div>
            <div class="divider"></div>
            <div class="report-row"><span>Чисто окладом</span><span id="stat-base">0 ₸</span></div>
            <div class="report-row"><span>Чисто процентами</span><span id="stat-bonus">0 ₸</span></div>
            <div class="divider"></div>
            <div class="report-row total-row"><span>Общий доход</span><span id="stat-total" style="font-size: 22px;">0 ₸</span></div>
            
            <button class="save-btn secondary-btn" onclick="toggleManualForm()">+ Добавить прошлую смену</button>
            
            <div id="manual-form" class="manual-form">
                <input type="date" id="manual-date">
                <div class="input-group">
                    <input type="number" id="manual-hookahs" placeholder="Кальяны (шт)" min="0">
                    <input type="number" id="manual-replacements" placeholder="Замены (шт)" min="0">
                </div>
                <button class="save-btn" style="padding: 12px; margin-top: 5px;" onclick="saveManualShift()">Записать в базу</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD_JuiPhUpFqJdV4TA3e0MKhxTskNm71_w",
            authDomain: "hokkahcalc.firebaseapp.com",
            projectId: "hokkahcalc",
            storageBucket: "hokkahcalc.firebasestorage.app",
            messagingSenderId: "604662761292",
            appId: "1:604662761292:web:32b392718f894bbddb31e9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const MAX_VALUE = 25;
        const REPEATS = 60;
        const ITEM_HEIGHT = 40;
        const BASE_SALARY = 7000;

        let hookahCount = 0;
        let replacementCount = 0;
        let currentHookahPrice = 0;
        let currentReplacementPrice = 0;
        let finalSum = 0;
        let shiftDateStr = "";
        let currentFilter = '3';
        
        let shiftDataCache = {};

        const fmt = (num) => num.toLocaleString('ru-RU');

        // --- Firebase Синхронизация ---
        async function fetchAllShifts() {
            try {
                const querySnapshot = await getDocs(collection(db, "shifts"));
                querySnapshot.forEach((doc) => {
                    shiftDataCache[doc.id] = doc.data();
                });
                
                const dbStatus = document.getElementById('db-status');
                dbStatus.textContent = "FIREBASE OK";
                dbStatus.style.color = "#4caf50";
                
                generateReport();
            } catch (error) {
                console.error("Ошибка при получении данных: ", error);
                document.getElementById('db-status').textContent = "ОШИБКА БАЗЫ";
                document.getElementById('db-status').style.color = "#f44336";
            }
        }

        window.saveCurrentShift = async function() {
            const btn = document.querySelector('.save-btn');
            btn.textContent = "СОХРАНЯЕМ В ОБЛАКО...";
            btn.style.backgroundColor = "#555";

            const shiftObj = {
                total: finalSum,
                hookahs: hookahCount,
                replacements: replacementCount,
                timestamp: Date.now()
            };

            try {
                await setDoc(doc(db, "shifts", shiftDateStr), shiftObj);
                shiftDataCache[shiftDateStr] = shiftObj;
                
                btn.textContent = "СОХРАНЕНО!";
                btn.style.backgroundColor = "#ffffff";
                btn.style.color = "#000000";
                generateReport(); 
            } catch (error) {
                btn.textContent = "ОШИБКА ДОСТУПА";
                btn.style.backgroundColor = "#f44336";
            }

            setTimeout(() => {
                btn.textContent = "СОХРАНИТЬ СМЕНУ";
                btn.style.backgroundColor = "var(--text-color)";
                btn.style.color = "var(--bg-color)";
            }, 2000);
        };

        // --- Ручной ввод прошлых смен ---
        window.toggleManualForm = function() {
            const form = document.getElementById('manual-form');
            form.style.display = form.style.display === 'block' ? 'none' : 'block';
        };

        window.saveManualShift = async function() {
            const dateInput = document.getElementById('manual-date').value;
            const hookahs = parseInt(document.getElementById('manual-hookahs').value) || 0;
            const replacements = parseInt(document.getElementById('manual-replacements').value) || 0;

            if (!dateInput) {
                alert("Пожалуйста, выбери дату");
                return;
            }

            const dateObj = new Date(dateInput);
            const day = dateObj.getDay();
            const isWeekend = (day === 5 || day === 6 || day === 0);
            
            const hPrice = isWeekend ? 7900 : 4900;
            const rPrice = isWeekend ? 5900 : 4490;

            const bonus = Math.round((hookahs * hPrice + replacements * rPrice) * 0.10);
            const total = BASE_SALARY + bonus;

            const shiftObj = { total, hookahs, replacements, timestamp: Date.now() };

            const btn = document.querySelector('#manual-form .save-btn');
            const ogText = btn.textContent;
            btn.textContent = "СОХРАНЕНИЕ...";

            try {
                await setDoc(doc(db, "shifts", dateInput), shiftObj);
                shiftDataCache[dateInput] = shiftObj;
                generateReport();
                
                document.getElementById('manual-date').value = '';
                document.getElementById('manual-hookahs').value = '';
                document.getElementById('manual-replacements').value = '';
                toggleManualForm();
            } catch (error) {
                alert("Ошибка! Проверь подключение к БД.");
            } finally {
                btn.textContent = ogText;
            }
        };

        // --- Фишка: Всплывающий Тултип ---
        window.showTooltip = function(event, dateLabel, total, hookahs, replacements, nodeId) {
            const tooltip = document.getElementById('tooltip');
            document.getElementById('tt-date').textContent = dateLabel;
            document.getElementById('tt-total').textContent = fmt(total) + ' ₸';
            document.getElementById('tt-details').innerHTML = `К: <span>${hookahs}</span> | З: <span>${replacements}</span>`;
            
            // Подсветка активной точки
            document.querySelectorAll('.active-node').forEach(el => el.remove());
            const target = event.currentTarget;
            const cx = target.getAttribute('cx');
            const cy = target.getAttribute('cy');
            
            // Добавляем эффект свечения
            const chartArea = document.getElementById('trend-chart').querySelector('svg');
            const glow = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            glow.setAttribute('cx', cx);
            glow.setAttribute('cy', cy);
            glow.setAttribute('r', '8');
            glow.setAttribute('fill', 'rgba(255,255,255,0.3)');
            glow.setAttribute('class', 'active-node');
            glow.style.pointerEvents = 'none';
            chartArea.appendChild(glow);

            // Позиционируем плашку
            const rect = target.getBoundingClientRect();
            tooltip.style.left = rect.left + (rect.width / 2) + 'px';
            tooltip.style.top = rect.top + 'px';
            tooltip.classList.add('visible');
        };

        window.hideTooltip = function() {
            document.getElementById('tooltip').classList.remove('visible');
            document.querySelectorAll('.active-node').forEach(el => el.remove());
        };

        // Скрыть тултип при клике мимо графика
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.chart-container')) hideTooltip();
        });

        // --- Логика Интерфейса ---
        function initPickers() {
            const hPicker = document.getElementById('hookah-picker');
            const rPicker = document.getElementById('replacement-picker');
            
            [hPicker, rPicker].forEach(picker => {
                const spacerBottom = picker.lastElementChild;
                for (let r = 0; r < REPEATS; r++) {
                    for (let i = 0; i <= MAX_VALUE; i++) {
                        const div = document.createElement('div');
                        div.className = 'picker-item';
                        div.dataset.value = i;
                        div.textContent = i;
                        picker.insertBefore(div, spacerBottom);
                    }
                }
                picker.style.scrollBehavior = 'auto';
                picker.scrollTop = Math.floor(REPEATS / 2) * (MAX_VALUE + 1) * ITEM_HEIGHT;
                setTimeout(() => picker.style.scrollBehavior = 'smooth', 50);
            });

            hPicker.addEventListener('scroll', () => handleScroll(hPicker, 'hookah'));
            rPicker.addEventListener('scroll', () => handleScroll(rPicker, 'replacement'));
        }

        function handleScroll(picker, type) {
            const index = Math.round(picker.scrollTop / ITEM_HEIGHT);
            const items = picker.querySelectorAll('.picker-item');
            items.forEach(item => item.classList.remove('active'));
            
            if (items[index]) {
                items[index].classList.add('active');
                const val = parseInt(items[index].dataset.value);
                type === 'hookah' ? hookahCount = val : replacementCount = val;
                calculateTotal();
            }
        }

        function getShiftDate() {
            const now = new Date();
            if (now.getHours() < 15) now.setDate(now.getDate() - 1); 
            return now;
        }

        function updateShiftPricing() {
            const shiftDate = getShiftDate();
            const day = shiftDate.getDay();
            
            shiftDateStr = shiftDate.toISOString().split('T')[0];

            const isWeekend = (day === 5 || day === 6 || day === 0); 
            currentHookahPrice = isWeekend ? 7900 : 4900;
            currentReplacementPrice = isWeekend ? 5900 : 4490;

            const days = ["ВС", "ПН", "ВТ", "СР", "ЧТ", "ПТ", "СБ"];
            document.getElementById('shift-status').textContent = `${shiftDateStr} | ${days[day]} | ${isWeekend ? 'ВЫХОДНОЙ' : 'БУДНИЙ'} ТАРИФ`;
        }

        function calculateTotal() {
            const bonus = Math.round((hookahCount * currentHookahPrice + replacementCount * currentReplacementPrice) * 0.10);
            finalSum = BASE_SALARY + bonus;
            document.getElementById('bonus-price').textContent = fmt(bonus) + ' ₸';
            document.getElementById('total-price').textContent = fmt(finalSum) + ' ₸';
        }

        window.setFilter = function(type, btnObj) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btnObj.classList.add('active');
            currentFilter = type;
            
            document.getElementById('custom-dates').style.display = type === 'custom' ? 'flex' : 'none';
            if(type !== 'custom') generateReport();
        }

        window.generateReport = function() {
            const dates = Object.keys(shiftDataCache).sort();
            if (dates.length === 0) {
                document.getElementById('trend-chart').innerHTML = '';
                return;
            }

            let targetDates = [];
            const today = getShiftDate();
            today.setHours(0,0,0,0);

            if (currentFilter === 'all') {
                targetDates = dates; 
            } else if (currentFilter === 'custom') {
                const start = document.getElementById('date-start').value;
                const end = document.getElementById('date-end').value;
                if (!start || !end) return;
                targetDates = dates.filter(d => d >= start && d <= end);
            } else {
                const daysBack = parseInt(currentFilter);
                for(let i = daysBack - 1; i >= 0; i--) {
                    const d = new Date(today);
                    d.setDate(d.getDate() - i);
                    targetDates.push(d.toISOString().split('T')[0]);
                }
            }

            renderStatsAndChart(targetDates, shiftDataCache);
        }

        function renderStatsAndChart(dates, dbData) {
            let sumTotal = 0;
            let sumBase = 0;
            let sumBonus = 0;
            let sumHookahs = 0;
            let shiftsWorked = 0;
            let maxDailyTotal = 1;

            dates.forEach(date => {
                if(dbData[date]) {
                    shiftsWorked++;
                    sumTotal += dbData[date].total;
                    sumBase += BASE_SALARY; 
                    sumBonus += (dbData[date].total - BASE_SALARY); 
                    sumHookahs += dbData[date].hookahs;
                    if(dbData[date].total > maxDailyTotal) maxDailyTotal = dbData[date].total;
                }
            });

            document.getElementById('stat-shifts').textContent = shiftsWorked;
            document.getElementById('stat-hookahs').textContent = sumHookahs;
            document.getElementById('stat-base').textContent = fmt(sumBase) + ' ₸';
            document.getElementById('stat-bonus').textContent = fmt(sumBonus) + ' ₸';
            document.getElementById('stat-total').textContent = fmt(sumTotal) + ' ₸';

            const chartArea = document.getElementById('trend-chart');
            if (dates.length === 0) {
                chartArea.innerHTML = '';
                return;
            }

            const minSpacePerPoint = 45; 
            const containerWidth = chartArea.clientWidth || 360;
            const svgWidth = Math.max(containerWidth, dates.length * minSpacePerPoint);
            const svgHeight = 140;
            
            const paddingX = 25;
            const paddingYTop = 20;
            const paddingYBottom = 30; 
            
            let polylinePoints = [];
            let graphicsHTML = '';

            dates.forEach((date, i) => {
                const dayData = dbData[date] || { total: 0, hookahs: 0, replacements: 0 };
                const val = dayData.total;
                
                let x = dates.length === 1 ? svgWidth / 2 : paddingX + (i * (svgWidth - 2 * paddingX) / (dates.length - 1));
                const yRange = svgHeight - paddingYTop - paddingYBottom;
                const y = paddingYTop + yRange - (val / maxDailyTotal) * yRange;

                polylinePoints.push(`${x},${y}`);

                const shortDate = date.split('-')[2] + '.' + date.split('-')[1];
                const dateLabelFull = new Date(date).toLocaleDateString('ru-RU', {day: 'numeric', month: 'long'});
                
                // Визуальная точка
                graphicsHTML += `<circle cx="${x}" cy="${y}" r="3" fill="var(--bg-color)" stroke="var(--text-color)" stroke-width="2" style="pointer-events:none;" id="node-${i}" />`;
                
                // Невидимая зона (Hitbox) для удобного тапа пальцем
                graphicsHTML += `<circle cx="${x}" cy="${y}" r="20" fill="transparent" class="chart-node-hitbox" onclick="showTooltip(event, '${dateLabelFull}', ${val}, ${dayData.hookahs}, ${dayData.replacements}, 'node-${i}')" />`;
                
                graphicsHTML += `<text x="${x}" y="${svgHeight - 10}" fill="var(--muted)" font-size="10" font-family="sans-serif" text-anchor="middle" style="pointer-events:none;">${shortDate}</text>`;
            });

            const svgHTML = `
                <svg width="${svgWidth}" height="${svgHeight}" style="display: block;">
                    <line x1="${paddingX}" y1="${svgHeight - paddingYBottom + 5}" x2="${svgWidth - paddingX}" y2="${svgHeight - paddingYBottom + 5}" stroke="var(--border)" stroke-width="1" />
                    <polyline points="${polylinePoints.join(' ')}" fill="none" stroke="var(--text-color)" stroke-width="2" stroke-linejoin="round" style="pointer-events:none;" />
                    ${graphicsHTML}
                </svg>
            `;

            chartArea.innerHTML = svgHTML;

            setTimeout(() => {
                chartArea.scrollLeft = chartArea.scrollWidth;
            }, 50);
        }

        initPickers();
        updateShiftPricing();
        
        const dEnd = getShiftDate();
        const dStart = new Date(dEnd.getFullYear(), dEnd.getMonth(), 1);
        document.getElementById('date-end').value = dEnd.toISOString().split('T')[0];
        document.getElementById('date-start').value = dStart.toISOString().split('T')[0];

        setTimeout(() => {
            handleScroll(document.getElementById('hookah-picker'), 'hookah');
            handleScroll(document.getElementById('replacement-picker'), 'replacement');
        }, 100);

        setInterval(() => {
            updateShiftPricing();
            calculateTotal();
        }, 60000);

        fetchAllShifts();

    </script>
</body>
</html>
