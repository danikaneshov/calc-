<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Калькулятор Смены</title>
    <style>
        :root {
            --bg-color: #1c1c1e;
            --text-color: #ffffff;
            --highlight: #2c2c2e;
            --accent: #0a84ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .status-badge {
            background-color: var(--highlight);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 14px;
            margin-bottom: 30px;
            color: #8e8e93;
        }

        /* Контейнер для двух колесиков */
        .pickers-wrapper {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        .picker-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .picker-label {
            font-size: 16px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        /* Само колесико */
        .picker-container {
            height: 150px; /* Показываем 3 элемента по 50px */
            width: 100%;
            position: relative;
            background-color: var(--highlight);
            border-radius: 15px;
            overflow: hidden;
        }

        /* Выделение центрального элемента */
        .picker-container::before {
            content: "";
            position: absolute;
            top: 50px;
            left: 0;
            right: 0;
            height: 50px;
            background-color: rgba(255, 255, 255, 0.1);
            pointer-events: none;
            z-index: 2;
        }

        .picker {
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none; /* Скрываем скроллбар в Firefox */
            -ms-overflow-style: none;  /* Скрываем скроллбар в IE 10+ */
            position: relative;
            z-index: 1;
        }

        .picker::-webkit-scrollbar {
            display: none; /* Скрываем скроллбар в Chrome/Safari */
        }

        /* Пустые элементы для отступов сверху и снизу, чтобы первый и последний элементы могли встать в центр */
        .spacer {
            height: 50px;
        }

        .picker-item {
            height: 50px;
            line-height: 50px;
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            scroll-snap-align: center;
            color: #8e8e93;
            transition: color 0.2s;
        }

        .picker-item.active {
            color: var(--text-color);
            font-size: 26px;
        }

        /* Блок с итогами */
        .result-card {
            margin-top: 40px;
            background-color: var(--highlight);
            width: 100%;
            max-width: 360px;
            border-radius: 20px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .total-price {
            font-size: 40px;
            font-weight: bold;
            color: var(--accent);
            margin: 10px 0;
        }

        .breakdown {
            font-size: 14px;
            color: #8e8e93;
            margin-top: 10px;
            line-height: 1.5;
        }

    </style>
</head>
<body>

    <h1>Калькулятор</h1>
    <div class="status-badge" id="shift-status">Определение смены...</div>

    <div class="pickers-wrapper">
        <div class="picker-column">
            <div class="picker-label">Кальяны</div>
            <div class="picker-container">
                <div class="picker" id="hookah-picker">
                    <div class="spacer"></div>
                    <div class="spacer"></div>
                </div>
            </div>
        </div>

        <div class="picker-column">
            <div class="picker-label">Замены</div>
            <div class="picker-container">
                <div class="picker" id="replacement-picker">
                    <div class="spacer"></div>
                    <div class="spacer"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="result-card">
        <div style="font-size: 16px; color: #8e8e93;">Итого за смену</div>
        <div class="total-price" id="total-price">0 ₸</div>
        <div class="breakdown" id="price-breakdown">
            Кальян: 0 ₸ | Замена: 0 ₸
        </div>
    </div>

    <script>
        const MAX_ITEMS = 25;
        const ITEM_HEIGHT = 50;

        const hookahPicker = document.getElementById('hookah-picker');
        const replacementPicker = document.getElementById('replacement-picker');
        
        let hookahCount = 0;
        let replacementCount = 0;

        let currentHookahPrice = 0;
        let currentReplacementPrice = 0;

        // Генерация цифр от 0 до 25
        function populatePicker(picker) {
            const spacerBottom = picker.lastElementChild;
            for (let i = 0; i <= MAX_ITEMS; i++) {
                const div = document.createElement('div');
                div.className = 'picker-item';
                div.textContent = i;
                picker.insertBefore(div, spacerBottom);
            }
        }

        populatePicker(hookahPicker);
        populatePicker(replacementPicker);

        // Логика определения смены и цен
        function updateShiftPricing() {
            const now = new Date();
            let day = now.getDay(); // 0 - ВС, 1 - ПН, ..., 5 - ПТ, 6 - СБ
            let hour = now.getHours();

            // Если время до 15:00, значит смена еще вчерашняя
            if (hour < 15) {
                day = day - 1;
                if (day < 0) day = 6; // Если было ВС (0), становится СБ (6)
            }

            // ПТ (5), СБ (6), ВС (0)
            const isWeekend = (day === 5 || day === 6 || day === 0);

            if (isWeekend) {
                currentHookahPrice = 7900;
                currentReplacementPrice = 5900;
            } else {
                currentHookahPrice = 4990;
                currentReplacementPrice = 4490;
            }

            const days = ["Воскресенье", "Понедельник", "Вторник", "Среда", "Четверг", "Пятница", "Суббота"];
            document.getElementById('shift-status').textContent = `Смена: ${days[day]} (Тариф: ${isWeekend ? 'Выходной' : 'Будний'})`;
        }

        // Подсчет итоговой суммы
        function calculateTotal() {
            const totalHookah = hookahCount * currentHookahPrice;
            const totalReplacement = replacementCount * currentReplacementPrice;
            const totalSum = totalHookah + totalReplacement;

            document.getElementById('total-price').textContent = totalSum.toLocaleString('ru-RU') + ' ₸';
            document.getElementById('price-breakdown').textContent = 
                `Кальяны: ${currentHookahPrice} ₸ | Замены: ${currentReplacementPrice} ₸`;
        }

        // Отслеживание прокрутки колесика (Scroll Snap)
        function handleScroll(picker, type) {
            // Вычисляем, какой элемент сейчас в центре
            const scrollTop = picker.scrollTop;
            const index = Math.round(scrollTop / ITEM_HEIGHT);
            
            // Защита от выхода за пределы
            const safeIndex = Math.max(0, Math.min(index, MAX_ITEMS));

            // Обновляем визуальное выделение
            const items = picker.querySelectorAll('.picker-item');
            items.forEach((item, i) => {
                if (i === safeIndex) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });

            // Записываем значение и пересчитываем
            if (type === 'hookah') {
                hookahCount = safeIndex;
            } else {
                replacementCount = safeIndex;
            }
            
            calculateTotal();
        }

        // Слушатели событий прокрутки
        hookahPicker.addEventListener('scroll', () => handleScroll(hookahPicker, 'hookah'));
        replacementPicker.addEventListener('scroll', () => handleScroll(replacementPicker, 'replacement'));

        // Инициализация
        updateShiftPricing();
        handleScroll(hookahPicker, 'hookah'); // Установит начальное значение 0
        handleScroll(replacementPicker, 'replacement');

        // Обновлять тариф каждые 60 секунд (на случай если приложение оставлено открытым при переходе через 15:00)
        setInterval(() => {
            updateShiftPricing();
            calculateTotal();
        }, 60000);

    </script>
</body>
</html>
