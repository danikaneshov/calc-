<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Смена / Аналитика</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --highlight: #111111;
            --muted: #666666;
            --border: #222222;
            --accent: #ff9800; 
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px 20px 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            letter-spacing: -0.5px;
            transition: background-color 0.3s ease;
            overflow-x: hidden;
        }

        /* Заголовки */
        .app-title {
            font-size: 24px;
            font-weight: 800;
            margin: 10px 0 5px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            width: 100%;
            max-width: 400px;
            transition: color 0.3s;
        }

        .admin-title {
            display: none;
            color: var(--text-color);
        }

        .status-badge {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--muted);
            width: 100%;
            max-width: 400px;
            margin-bottom: 30px;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
        }

        #db-status { color: var(--accent); }

        /* Калькулятор */
        .pickers-wrapper {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 400px;
        }

        .picker-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .picker-label {
            font-size: 12px;
            margin-bottom: 10px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--muted);
            letter-spacing: 1px;
        }

        .picker-container {
            height: 120px;
            width: 100%;
            position: relative;
            background-color: var(--highlight);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .picker-container::before {
            content: "";
            position: absolute;
            top: 40px;
            left: 0;
            right: 0;
            height: 40px;
            background-color: rgba(255, 255, 255, 0.03);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            pointer-events: none;
            z-index: 2;
        }

        .picker {
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            -ms-overflow-style: none;
            position: relative;
            z-index: 1;
            scroll-behavior: smooth;
        }

        .picker::-webkit-scrollbar { display: none; }
        .spacer { height: 40px; }

        .picker-item {
            height: 40px;
            line-height: 40px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            scroll-snap-align: center;
            color: #333;
            transition: all 0.2s ease;
        }

        .picker-item.active {
            color: var(--text-color);
            font-size: 24px;
        }

        /* Итоги */
        .result-card {
            margin-top: 30px;
            width: 100%;
            max-width: 400px;
        }

        .report-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 8px 0;
            font-size: 14px;
            color: var(--muted);
        }

        .report-row span:last-child {
            font-weight: 600;
            color: var(--text-color);
            font-variant-numeric: tabular-nums;
        }

        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 15px 0;
        }

        .total-row span:first-child { font-weight: 800; text-transform: uppercase; color: var(--text-color); }
        .total-price { font-size: 28px; font-weight: 800; }

        .save-btn {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background-color: var(--text-color);
            color: var(--bg-color);
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .save-btn:active { transform: scale(0.98); opacity: 0.8; }

        .secondary-btn {
            background-color: var(--highlight);
            color: var(--muted);
            border: 1px solid var(--border);
            margin-top: 30px;
            font-size: 11px;
        }

        /* Инсайты */
        .insights-block {
            background-color: #0a0a0a;
            border: 1px dashed var(--border);
            border-radius: 4px;
            padding: 15px;
            margin-top: 15px;
        }
        
        .insight-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .insight-row:last-child { margin-bottom: 0; }
        .insight-row span:last-child { color: var(--accent); font-weight: 700; text-transform: uppercase; }

        /* Форма ручного ввода */
        .manual-form {
            display: none;
            background: var(--highlight);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 15px;
            margin-top: 15px;
        }
        .manual-form input {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            color: var(--text-color);
            padding: 12px;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
            margin-bottom: 10px;
            color-scheme: dark;
        }
        .manual-form .input-group {
            display: flex;
            gap: 10px;
        }

        /* Аналитика */
        .analytics-section {
            width: 100%;
            max-width: 400px;
            margin-top: 50px;
            position: relative;
            transition: opacity 0.3s ease;
        }

        .filters { display: flex; gap: 5px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-btn {
            flex: 1; padding: 8px 2px; background: transparent; border: 1px solid var(--border);
            color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase;
            border-radius: 4px; cursor: pointer; transition: all 0.2s ease;
        }
        .filter-btn.active { background: var(--text-color); color: var(--bg-color); border-color: var(--text-color); }

        .date-inputs { display: flex; gap: 5px; width: 100%; margin-top: 5px; }
        .date-inputs input {
            flex: 1; background: transparent; border: 1px solid var(--border); color: var(--text-color);
            padding: 8px; border-radius: 4px; font-family: inherit; font-size: 12px; color-scheme: dark;
        }

        .chart-container { position: relative; width: 100%; margin-bottom: 20px; }
        .chart {
            width: 100%; height: 140px; border-bottom: 1px solid var(--border);
            overflow-x: auto; overflow-y: hidden; -ms-overflow-style: none; scrollbar-width: none; scroll-behavior: smooth;
        }
        .chart::-webkit-scrollbar { display: none; }
        .chart-node-hitbox { cursor: pointer; -webkit-tap-highlight-color: transparent; }

        .chart-tooltip {
            position: fixed; background: rgba(28, 28, 30, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); color: var(--text-color); padding: 10px 14px; border-radius: 8px;
            font-size: 13px; pointer-events: none; opacity: 0; transform: translate(-50%, 10px);
            transition: opacity 0.2s ease, transform 0.2s ease; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;
        }
        .chart-tooltip.visible { opacity: 1; transform: translate(-50%, -15px); }
        .tooltip-date { font-size: 10px; color: var(--muted); text-transform: uppercase; font-weight: 800; letter-spacing: 1px; margin-bottom: 4px; }
        .tooltip-total { font-size: 18px; font-weight: 800; color: var(--text-color); margin-bottom: 4px; font-variant-numeric: tabular-nums;}
        .tooltip-details { font-size: 11px; color: var(--muted); font-weight: 600; }
        .tooltip-details span { color: var(--text-color); }

        /* === РЕЖИМ СВЕРКИ (АДМИН) === */
        .admin-view { display: none; }
        
        body.admin-mode {
            background-color: #050505; /* Чуть темнее для визуального отличия */
        }
        body.admin-mode .personal-view { display: none !important; }
        body.admin-mode .admin-view { display: flex !important; }
        body.admin-mode .admin-title { display: block; color: var(--muted); }
        body.admin-mode .personal-title { display: none; }
        body.admin-mode .analytics-section { display: none !important; }
        body.admin-mode .save-btn { display: none !important; }
        body.admin-mode #db-status { display: none; } /* Скрываем статус базы от глаз админа */

    </style>
</head>
<body>

    <div id="tooltip" class="chart-tooltip">
        <div class="tooltip-date" id="tt-date">--</div>
        <div class="tooltip-total" id="tt-total">--</div>
        <div class="tooltip-details" id="tt-details">--</div>
    </div>

    <h1 class="app-title personal-title">Смена</h1>
    <h1 class="app-title admin-title">Сверка Кассы</h1>

    <div class="status-badge">
        <span id="shift-status">Загрузка...</span>
        <span id="db-status">ПОДКЛЮЧЕНИЕ...</span>
    </div>

    <div class="pickers-wrapper">
        <div class="picker-column">
            <div class="picker-label">Кальяны</div>
            <div class="picker-container"><div class="picker" id="hookah-picker"><div class="spacer"></div><div class="spacer"></div></div></div>
        </div>
        <div class="picker-column">
            <div class="picker-label">Замены</div>
            <div class="picker-container"><div class="picker" id="replacement-picker"><div class="spacer"></div><div class="spacer"></div></div></div>
        </div>
    </div>

    <div class="result-card">
        <div class="personal-view" style="display: block; width: 100%;">
            <div class="report-row"><span>Оклад</span><span>7 000 ₸</span></div>
            <div class="report-row"><span>Процент (10%)</span><span id="bonus-price">0 ₸</span></div>
            <div class="divider"></div>
            <div class="report-row total-row"><span>Мой итог</span><span class="total-price" id="total-price">7 000 ₸</span></div>
        </div>

        <div class="admin-view" style="flex-direction: column; width: 100%;">
            <div class="report-row"><span>Кальяны (Касса)</span><span id="admin-hookahs-money">0 ₸</span></div>
            <div class="report-row"><span>Замены (Касса)</span><span id="admin-replacements-money">0 ₸</span></div>
            <div class="divider"></div>
            <div class="report-row total-row"><span>В кассу</span><span class="total-price" id="admin-total-price">0 ₸</span></div>
        </div>

        <button class="save-btn personal-view" onclick="saveCurrentShift()">Сохранить смену</button>
    </div>

    <div class="analytics-section">
        <h1>Аналитика</h1>
        
        <div class="filters">
            <button class="filter-btn active" onclick="setFilter('3', this)">3 дня</button>
            <button class="filter-btn" onclick="setFilter('7', this)">Неделя</button>
            <button class="filter-btn" onclick="setFilter('30', this)">Месяц</button>
            <button class="filter-btn" onclick="setFilter('all', this)">Все</button>
            <button class="filter-btn" onclick="setFilter('custom', this)">Период</button>
        </div>
        
        <div class="date-inputs" id="custom-dates" style="display: none;">
            <input type="date" id="date-start" onchange="generateReport()">
            <input type="date" id="date-end" onchange="generateReport()">
        </div>

        <div class="chart-container">
            <div class="chart" id="trend-chart" onscroll="hideTooltip()"></div>
        </div>

        <div class="result-card" style="margin-top: 0;">
            <div class="report-row"><span>Смен отработано</span><span id="stat-shifts">0</span></div>
            <div class="report-row"><span>Сделано кальянов</span><span id="stat-hookahs">0</span></div>
            <div class="divider"></div>
            
            <div class="insights-block">
                <div class="insight-row"><span>Средний чек смены:</span><span id="stat-avg">0 ₸</span></div>
                <div class="insight-row"><span>Самый прибыльный день:</span><span id="stat-best-day">-</span></div>
            </div>

            <div class="divider"></div>
            <div class="report-row total-row"><span>Общий доход</span><span id="stat-total" style="font-size: 22px;">0 ₸</span></div>
            
            <button class="save-btn secondary-btn" onclick="toggleManualForm()">+ Добавить прошлую смену</button>
            
            <div id="manual-form" class="manual-form">
                <input type="date" id="manual-date">
                <div class="input-group">
                    <input type="number" id="manual-hookahs" placeholder="Кальяны (шт)" min="0">
                    <input type="number" id="manual-replacements" placeholder="Замены (шт)" min="0">
                </div>
                <button class="save-btn" style="padding: 12px; margin-top: 5px;" onclick="saveManualShift()">Записать в базу</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD_JuiPhUpFqJdV4TA3e0MKhxTskNm71_w",
            authDomain: "hokkahcalc.firebaseapp.com",
            projectId: "hokkahcalc",
            storageBucket: "hokkahcalc.firebasestorage.app",
            messagingSenderId: "604662761292",
            appId: "1:604662761292:web:32b392718f894bbddb31e9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const MAX_VALUE = 25;
        const REPEATS = 60;
        const ITEM_HEIGHT = 40;
        const BASE_SALARY = 7000;

        let hookahCount = 0;
        let replacementCount = 0;
        let currentHookahPrice = 0;
        let currentReplacementPrice = 0;
        let finalSum = 0;
        let shiftDateStr = "";
        let currentFilter = '3';
        
        let lastHookahIndex = -1;
        let lastReplacementIndex = -1;
        
        let shiftDataCache = {};

        const fmt = (num) => num.toLocaleString('ru-RU');

        // --- ЛОГИКА СВАЙПА (РЕЖИМ СВЕРКИ) ---
        let startX = 0;
        let startY = 0;

        // Запоминаем старт (и для мыши, и для пальца)
        document.addEventListener('mousedown', e => { startX = e.screenX; startY = e.screenY; });
        document.addEventListener('touchstart', e => { startX = e.changedTouches[0].screenX; startY = e.changedTouches[0].screenY; });

        // Обрабатываем конец свайпа
        document.addEventListener('mouseup', e => handleGesture(e.screenX, e.screenY));
        document.addEventListener('touchend', e => handleGesture(e.changedTouches[0].screenX, e.changedTouches[0].screenY));

        function handleGesture(endX, endY) {
            const diffX = endX - startX;
            const diffY = endY - startY;

            // Проверяем, что это именно свайп (длиннее 40px), а не просто тап/клик, 
            // и что он горизонтальный (по оси X движение больше, чем по Y)
            if (Math.abs(diffX) > 40 && Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 0) {
                    // Свайп вправо -> Режим для Нурбола
                    document.body.classList.add('admin-mode');
                } else {
                    // Свайп влево -> Возврат к твоим доходам
                    document.body.classList.remove('admin-mode');
                }
            }
        }


        // --- Firebase ---
        async function fetchAllShifts() {
            try {
                const querySnapshot = await getDocs(collection(db, "shifts"));
                querySnapshot.forEach((doc) => {
                    shiftDataCache[doc.id] = doc.data();
                });
                
                const dbStatus = document.getElementById('db-status');
                dbStatus.textContent = "FIREBASE OK";
                dbStatus.style.color = "#4caf50";
                
                generateReport();
            } catch (error) {
                document.getElementById('db-status').textContent = "ОШИБКА БАЗЫ";
                document.getElementById('db-status').style.color = "#f44336";
            }
        }

        window.saveCurrentShift = async function() {
            const btn = document.querySelector('.save-btn');
            btn.textContent = "СОХРАНЯЕМ В ОБЛАКО...";
            btn.style.backgroundColor = "#555";

            const shiftObj = { total: finalSum, hookahs: hookahCount, replacements: replacementCount, timestamp: Date.now() };

            try {
                await setDoc(doc(db, "shifts", shiftDateStr), shiftObj);
                shiftDataCache[shiftDateStr] = shiftObj;
                btn.textContent = "СОХРАНЕНО!";
                btn.style.backgroundColor = "#ffffff";
                btn.style.color = "#000000";
                generateReport(); 
            } catch (error) {
                btn.textContent = "ОШИБКА ДОСТУПА";
                btn.style.backgroundColor = "#f44336";
            }

            setTimeout(() => {
                btn.textContent = "СОХРАНИТЬ СМЕНУ";
                btn.style.backgroundColor = "var(--text-color)";
                btn.style.color = "var(--bg-color)";
            }, 2000);
        };

        window.toggleManualForm = function() {
            const form = document.getElementById('manual-form');
            form.style.display = form.style.display === 'block' ? 'none' : 'block';
        };

        window.saveManualShift = async function() {
            const dateInput = document.getElementById('manual-date').value;
            const hookahs = parseInt(document.getElementById('manual-hookahs').value) || 0;
            const replacements = parseInt(document.getElementById('manual-replacements').value) || 0;

            if (!dateInput) return alert("Пожалуйста, выбери дату");

            const day = new Date(dateInput).getDay();
            const isWeekend = (day === 5 || day === 6 || day === 0);
            const hPrice = isWeekend ? 7900 : 4900;
            const rPrice = isWeekend ? 5900 : 4490;
            const total = BASE_SALARY
